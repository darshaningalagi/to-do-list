<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Enhanced To-Do List with Voice Note Reminder</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <h1>To-Do List with Voice Note Reminder</h1>
  <div class="input-group">
    <input type="text" id="new-task" placeholder="Add a new task..." autocomplete="off" />
    <input type="time" id="new-task-time" />
    <button class="add-btn" id="add-task-btn" title="Add Task">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" class="feather feather-plus" width="20" height="20"
        viewBox="0 0 24 24">
        <path d="M12 5v14M5 12h14" />
      </svg>
      Add
    </button>
  </div>
  <div class="voice-group">
    <button id="record-btn" class="record-btn" title="Record Voice Note">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" class="feather feather-mic" width="20" height="20"
        viewBox="0 0 24 24">
        <path
          d="M12 1c-1.654 0-3 1.346-3 3v7c0 1.654 1.346 3 3 3s3-1.346 3-3V4c0-1.654-1.346-3-3-3z" />
        <path d="M19 10v1c0 3.308-2.692 6-6 6s-6-2.692-6-6v-1" />
        <line x1="12" y1="19" x2="12" y2="23" />
        <line x1="8" y1="23" x2="16" y2="23" />
      </svg>
      <span id="record-status-text">Start Recording Voice Note</span>
    </button>
  </div>
  <ul id="task-list"></ul>
  <div class="footer">Record voice notes with tasks; they will play automatically at the scheduled time.</div>
</div>
<script src="script.js">
  
</script>
</body>
</html>
